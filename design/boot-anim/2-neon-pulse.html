<!doctype html>
<html><head><meta charset="utf-8"><title>2 - Neon Pulse</title>
<style>
  html,body{margin:0;height:100%;background:#04050a;color:#cfd6e4;font-family:system-ui,sans-serif;overflow:hidden}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
  canvas{display:block}
  .label{font-size:13px;letter-spacing:.3em;color:#5f6b82;text-transform:uppercase}
  button{margin-top:18px;background:#11151f;border:1px solid #2a3245;color:#9fb0d0;padding:8px 16px;border-radius:6px;cursor:pointer;letter-spacing:.15em;font-size:11px}
  button:hover{background:#1a2030}
</style></head>
<body><div class="wrap">
<canvas id="c" width="640" height="360"></canvas>
<div class="label">Concept 2 &mdash; Neon Pulse</div>
<button onclick="t0=performance.now()">Replay</button>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=c.width,H=c.height,CX=W/2,CY=H/2;
let t0=performance.now();
function frame(now){
  const t=(now-t0)/1000;
  x.fillStyle='#04050a';x.fillRect(0,0,W,H);
  // orbiting rings
  for(let i=0;i<3;i++){
    const r=70+i*22;
    const a=t*(0.6+i*0.25)+i;
    x.strokeStyle=`rgba(${80+i*40},${180-i*20},255,${0.25+0.15*Math.sin(t*2+i)})`;
    x.lineWidth=1.5;
    x.beginPath();x.arc(CX,CY,r,a,a+Math.PI*1.2);x.stroke();
    // node
    x.fillStyle='#9ad4ff';
    x.beginPath();x.arc(CX+Math.cos(a+Math.PI*1.2)*r,CY+Math.sin(a+Math.PI*1.2)*r,2.5,0,Math.PI*2);x.fill();
  }
  // pulse glow
  const p=(Math.sin(t*2.4)+1)/2;
  const g=x.createRadialGradient(CX,CY,0,CX,CY,160);
  g.addColorStop(0,`rgba(90,170,255,${0.25+0.25*p})`);g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  // N glyph
  x.save();
  x.translate(CX,CY);
  x.strokeStyle='#cfe7ff';x.lineWidth=6;x.lineCap='round';x.lineJoin='round';
  const reveal=Math.min(1,t/1.2);
  const pts=[[-26,28],[-26,-28],[26,28],[26,-28]];
  // draw N path progressively
  const total=3; const seg=reveal*total;
  x.shadowColor='#5aaaff';x.shadowBlur=22;
  x.beginPath();x.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<=Math.min(3,Math.ceil(seg));i++){
    const a=pts[i-1],b=pts[i];
    const f=Math.min(1,seg-(i-1));
    x.lineTo(a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f);
  }
  x.stroke();
  x.restore();
  // wordmark
  const wa=Math.max(0,Math.min(1,(t-1.3)/0.6));
  x.globalAlpha=wa;
  x.shadowColor='#5aaaff';x.shadowBlur=14;
  x.fillStyle='#e6f0ff';x.font='600 22px system-ui,sans-serif';x.textAlign='center';
  x.fillText('NexusOS',CX,CY+72);
  x.shadowBlur=0;x.globalAlpha=1;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
